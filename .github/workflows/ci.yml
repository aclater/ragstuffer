name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint-shell:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: .

  test:
    name: pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install --quiet -r requirements.txt pytest pytest-cov hypothesis prometheus-client
      - name: Run tests with coverage
        run: python -m pytest --cov=. --cov-report=xml --cov-report=term-missing -v
      - uses: codecov/codecov-action@v6.0.1
        with:
          file: coverage.xml
          fail_ci_if_error: false

  mypy:
    name: mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install --quiet -r requirements.txt mypy
      - name: Run mypy
        run: mypy *.py --ignore-missing-imports
        continue-on-error: true
