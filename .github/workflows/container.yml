name: Container image

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    paths:
      - "Containerfile*"
      - "pyproject.toml"
      - "requirements.txt"
      - "ragstuffer.py"
      - "common.py"

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  hadolint:
    name: Hadolint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dockerfile:
          - Containerfile
          - Containerfile.rocm
          - Containerfile.cuda
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: ${{ matrix.dockerfile }}

  build:
    name: Build & push (${{ matrix.variant }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - variant: cpu
            file: Containerfile
            suffix: ""
          - variant: rocm
            file: Containerfile.rocm
            suffix: "-rocm"
          - variant: cuda
            file: Containerfile.cuda
            suffix: "-cuda"
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch,suffix=${{ matrix.suffix }}
            type=semver,pattern={{version}},suffix=${{ matrix.suffix }}
            type=semver,pattern={{major}}.{{minor}},suffix=${{ matrix.suffix }}
            type=sha,suffix=${{ matrix.suffix }}

      - name: Build (PR) / Build & push (main/tag)
        id: build
        uses: docker/build-push-action@v7.0.0
        with:
          context: .
          file: ${{ matrix.file }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: digest

      - name: Generate SBOM
        uses: anchore/sbom-action@v0.24.0
        with:
          image: ghcr.io/aclater/${{ github.event.repository.name }}:main${{ matrix.suffix }}
          format: spdx-json
          output-file: sbom.spdx.json
          upload-artifact: false

      - name: Attest SBOM
        uses: actions/attest-sbom@v4.1.0
        id: attest
        with:
          subject-name: ghcr.io/aclater/${{ github.event.repository.name }}
          subject-digest: ${{ steps.build.outputs.digest }}
          sbom-path: sbom.spdx.json
          push-to-registry: true

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: sbom-${{ matrix.variant }}-${{ github.run_id }}
          path: sbom.spdx.json
          retention-days: 90

  sbom:
    name: SBOM (CycloneDX)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"
      - name: Install dependencies and generate SBOM
        run: |
          pip install --quiet -r requirements.txt cyclonedx-bom
          cyclonedx-py environment -o sbom.json --output-format json
      - uses: actions/upload-artifact@v7.0.0
        with:
          name: sbom-cyclonedx
          path: sbom.json