name: Container image

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    paths:
      - "Containerfile*"
      - "pyproject.toml"
      - "requirements.txt"
      - "ragstuffer.py"
      - "common.py"

permissions:
  contents: read
  packages: write
  attestations: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  hadolint:
    name: Hadolint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dockerfile:
          - Containerfile
          - Containerfile.rocm
          - Containerfile.cuda
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: ${{ matrix.dockerfile }}

  build:
    name: Build & push (${{ matrix.variant }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - variant: cpu
            file: Containerfile
            suffix: ""
          - variant: rocm
            file: Containerfile.rocm
            suffix: "-rocm"
          - variant: cuda
            file: Containerfile.cuda
            suffix: "-cuda"
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch,suffix=${{ matrix.suffix }}
            type=semver,pattern={{version}},suffix=${{ matrix.suffix }}
            type=semver,pattern={{major}}.{{minor}},suffix=${{ matrix.suffix }}
            type=sha,suffix=${{ matrix.suffix }}

      - name: Build (PR) / Build & push (main/tag)
        uses: docker/build-push-action@v7.0.0
        with:
          context: .
          file: ${{ matrix.file }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  sbom:
    name: SBOM & Attestation (${{ matrix.variant }})
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'
    strategy:
      matrix:
        include:
          - variant: cpu
            suffix: ""
          - variant: rocm
            suffix: "-rocm"
          - variant: cuda
            suffix: "-cuda"
    steps:
      - name: Generate SBOM
        uses: anchore/sbom-action@v0.24.0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}${{ matrix.suffix }}
          format: cyclonedx-json
          output-file: sbom.json

      - name: Attest SBOM
        uses: actions/attest-sbom@v4.1.0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}${{ matrix.suffix }}
          sbom: sbom.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: sbom-cyclonedx-${{ matrix.variant }}
          path: sbom.json
          retention-days: 90
